<div>
  <div id="sqlglot-lineage"></div>
  <script type="text/javascript" src="https://unpkg.com/vis-data@latest/peer/umd/vis-data.min.js"></script>
  <script type="text/javascript" src="https://unpkg.com/vis-network@latest/peer/umd/vis-network.min.js"></script>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/vis-network/styles/vis-network.min.css" />
  <script type="text/javascript">
    var nodes = new vis.DataSet([{"id": 4545015696, "label": "cs.customer_id AS customer_id", "title": "<pre>WITH cleaned_orders AS (\n  SELECT\n    o.order_id AS order_id,\n    o.customer_id AS customer_id,\n    CAST(o.order_ts AS DATE) AS order_date,\n    COALESCE(o.amount, 0) AS amount,\n    o.status AS order_status\n  FROM raw_orders AS o\n  WHERE\n    NOT o.order_ts IS NULL\n), valid_orders AS (\n  SELECT\n    cleaned_orders.order_id AS order_id,\n    cleaned_orders.customer_id AS customer_id,\n    cleaned_orders.order_date AS order_date,\n    cleaned_orders.amount AS amount,\n    cleaned_orders.order_status AS order_status\n  FROM cleaned_orders AS cleaned_orders\n  WHERE\n    cleaned_orders.order_status IN ('paid', 'shipped', 'completed')\n), orders_with_payments AS (\n  SELECT\n    vo.order_id AS order_id,\n    vo.customer_id AS customer_id,\n    vo.order_date AS order_date,\n    vo.amount AS amount,\n    p.payment_status AS payment_status\n  FROM valid_orders AS vo\n  LEFT JOIN raw_payments AS p\n    ON vo.order_id = p.order_id\n), paid_orders AS (\n  SELECT\n    orders_with_payments.order_id AS order_id,\n    orders_with_payments.customer_id AS customer_id,\n    orders_with_payments.order_date AS order_date,\n    orders_with_payments.amount AS amount\n  FROM orders_with_payments AS orders_with_payments\n  WHERE\n    orders_with_payments.payment_status = 'success'\n), customer_aggregates AS (\n  SELECT\n    po.customer_id AS customer_id,\n    COUNT(po.order_id) AS total_orders,\n    SUM(po.amount) AS total_revenue,\n    AVG(po.amount) AS avg_order_value,\n    MIN(po.order_date) AS first_order_date,\n    MAX(po.order_date) AS last_order_date\n  FROM paid_orders AS po\n  GROUP BY\n    po.customer_id\n), customer_enriched AS (\n  SELECT\n    c.customer_id AS customer_id,\n    c.customer_name AS customer_name,\n    c.country AS country,\n    c.signup_date AS signup_date,\n    ca.total_orders AS total_orders,\n    ca.total_revenue AS total_revenue,\n    ca.avg_order_value AS avg_order_value,\n    ca.first_order_date AS first_order_date,\n    ca.last_order_date AS last_order_date,\n    (\n      CURRENT_DATE - ca.last_order_date\n    ) AS days_since_last_order\n  FROM raw_customers AS c\n  LEFT JOIN customer_aggregates AS ca\n    ON c.customer_id = ca.customer_id\n), customer_segmented AS (\n  SELECT\n    ce.customer_id AS customer_id,\n    ce.customer_name AS customer_name,\n    ce.country AS country,\n    ce.signup_date AS signup_date,\n    COALESCE(ce.total_orders, 0) AS total_orders,\n    COALESCE(ce.total_revenue, 0) AS total_revenue,\n    ce.avg_order_value AS avg_order_value,\n    ce.first_order_date AS first_order_date,\n    ce.last_order_date AS last_order_date,\n    ce.days_since_last_order AS days_since_last_order,\n    CASE\n      WHEN ce.total_revenue >= 10000\n      THEN 'VIP'\n      WHEN ce.days_since_last_order > 180\n      THEN 'Churn Risk'\n      WHEN ce.total_orders >= 5\n      THEN 'Regular'\n      ELSE 'New'\n    END AS customer_segment\n  FROM customer_enriched AS ce\n)\nSELECT\n  <b>cs.customer_id AS customer_id</b>\nFROM customer_segmented AS cs</pre>", "group": 0}, {"id": 4545405584, "label": "ce.customer_id AS customer_id", "title": "<pre>SELECT\n  <b>ce.customer_id AS customer_id</b>\nFROM customer_enriched AS ce</pre>", "group": 0}, {"id": 4545929360, "label": "c.customer_id AS customer_id", "title": "<pre>SELECT\n  <b>c.customer_id AS customer_id</b>\nFROM raw_customers AS c\nLEFT JOIN customer_aggregates AS ca\n  ON c.customer_id = ca.customer_id</pre>", "group": 0}, {"id": 4545987472, "label": "FROM raw_customers", "title": "<pre>SELECT c.customer_id FROM raw_customers</pre>", "group": 1}])
    nodes.forEach(row => row["title"] = new DOMParser().parseFromString(row["title"], "text/html").body.childNodes[0])

    new vis.Network(
        document.getElementById("sqlglot-lineage"),
        {
            nodes: nodes,
            edges: new vis.DataSet([{"from": 4545015696, "to": 4545405584}, {"from": 4545405584, "to": 4545929360}, {"from": 4545929360, "to": 4545987472}])
        },
        {"height": "500px", "width": "100%", "layout": {"hierarchical": {"enabled": true, "nodeSpacing": 200, "sortMethod": "directed"}}, "interaction": {"dragNodes": false, "selectable": false}, "physics": {"enabled": false}, "edges": {"arrows": "to"}, "nodes": {"font": "20px monaco", "shape": "box", "widthConstraint": {"maximum": 300}}},
    )
  </script>
</div>
